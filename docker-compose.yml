services:
  compilator:
    image: ghcr.io/hashv0rt3x/compilator:latest
    container_name: compilator
    restart: unless-stopped
    network_mode: none
    volumes:
      - ../testcases:/opt/judge/testcases:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Judge__TestCasesBasePath: /opt/judge/testcases
      Judge__MaxParallelContainers: "4"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/swagger/v1/swagger.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
